<svg xmlns="http://www.w3.org/2000/svg" width="40" height="24" viewBox="0 0 40 24" role="img" aria-label="Motif wax africain">
  <!-- Triangle extérieur principal -->
  <polygon points="20,2 38,22 2,22" fill="none" stroke="#C8842A" stroke-width="1.5"/>
  <!-- Triangle intérieur rempli (motif kente) -->
  <polygon points="20,8 32,22 8,22" fill="#C8842A" opacity="0.25"/>
  <!-- Losange central -->
  <polygon points="20,10 26,17 20,22 14,17" fill="#C8842A" opacity="0.5"/>
  <!-- Point central -->
  <circle cx="20" cy="14" r="2" fill="#C8842A"/>
  <!-- Petits triangles latéraux décoratifs -->
  <polygon points="2,22 8,14 8,22" fill="#C8842A" opacity="0.4"/>
  <polygon points="38,22 32,14 32,22" fill="#C8842A" opacity="0.4"/>
  <!-- Ligne de base -->
  <line x1="2" y1="22" x2="38" y2="22" stroke="#C8842A" stroke-width="1" opacity="0.6"/>
</svg>
